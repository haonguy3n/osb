# Kernel CONFIG fragment for dm-verity verified root. Merged into defconfig via
# scripts/kconfig/merge_config.sh during the linux unit's build.
#
# DM_INIT lets the kernel assemble the verity device-mapper target from a
# `dm-mod.create=` command line at early boot, with no initramfs or userspace
# helper; DM_VERITY is the target itself. A Secure-Boot machine that opts into
# verity puts the (signed) table on its cmdline; every other machine ignores
# these and boots unaffected, so one shared kernel serves both.

# Device mapper core + verity target, built in so dm-mod.create works before
# any module could be loaded.
CONFIG_MD=y
CONFIG_BLK_DEV_DM=y
CONFIG_DM_VERITY=y

# Create device-mapper devices from the kernel command line.
CONFIG_DM_INIT=y

# A verity machine boots with no initramfs: the kernel creates /dev/dm-0 from
# dm-mod.create and mounts root=/dev/dm-0 directly. Everything on that path must
# therefore be built in, not a module — the block transport, the disk driver,
# and the root filesystem.
CONFIG_VIRTIO=y
CONFIG_VIRTIO_PCI=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_BLK=y
CONFIG_EXT4_FS=y

